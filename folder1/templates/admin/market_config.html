{% extends "base.html" %}

{% block title %}Market Configuration{% endblock %}

{% block content %}
<div class="container">
    <div class="mb-4">
        <h2 class="fw-bold mb-1">
            <i class="fas fa-clock me-2"></i>Market Configuration
        </h2>
        <p class="text-muted mb-0">Set the market schedule and trading days.</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label for="open_time" class="form-label">Market Open Time</label>
                    <input
                        type="time"
                        class="form-control"
                        id="open_time"
                        name="open_time"
                        value="{{ market_config.OpenTime.strftime('%H:%M') if market_config else '' }}"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="close_time" class="form-label">Market Close Time</label>
                    <input
                        type="time"
                        class="form-control"
                        id="close_time"
                        name="close_time"
                        value="{{ market_config.CloseTime.strftime('%H:%M') if market_config else '' }}"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="timezone" class="form-label">Time Zone</label>
                    <select class="form-select" id="timezone" name="timezone">
                        <option value="America/New_York"
                            {% if market_config and market_config.TimeZone == 'America/New_York' %}selected{% endif %}>
                            America/New_York (EST)
                        </option>

                        <option value="America/Los_Angeles"
                            {% if market_config and market_config.TimeZone == 'America/Los_Angeles' %}selected{% endif %}>
                            America/Los_Angeles (PST)
                        </option>

                        <option value="America/Chicago"
                            {% if market_config and market_config.TimeZone == 'America/Chicago' %}selected{% endif %}>
                            America/Chicago (CST)
                        </option>

                         <option value="America/Phoenix"
                            {% if market_config and market_config.TimeZone == 'America/Phoenix' %}selected{% endif %}>
                            America/Phoenix (MST)
                         </option>


                    </select>
                </div>

                <div class="mb-4">
                    <label for="weekdays_only" class="form-label">Trading Days</label>
                    <select class="form-select" id="weekdays_only" name="weekdays_only">
                        <option value="1" {% if market_config and market_config.WeekdaysOnly %}selected{% endif %}>
                            Weekdays Only
                        </option>
                        <option value="0" {% if market_config and not market_config.WeekdaysOnly %}selected{% endif %}>
                            All Days
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">Save Market Settings</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
