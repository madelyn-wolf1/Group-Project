{% extends "base.html" %}

{% block title %}Admin - Edit Stock{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Stock</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_stock', stock_id=stock.StockID) }}">
                    <div class="mb-3">
                        <label for="company_name" class="form-label">Company Name</label>
                        <input type="text" class="form-control" id="company_name" name="company_name" value="{{ stock.CompanyName }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="ticker" class="form-label">Ticker Symbol</label>
                        <input type="text" class="form-control text-uppercase" id="ticker" name="ticker" value="{{ stock.Ticker }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="total_volume" class="form-label">Total Volume</label>
                        <input type="number" class="form-control" id="total_volume" name="total_volume" value="{{ stock.TotalVolume }}" min="1" required>
                    </div>

                    <div class="mb-3">
                        <label for="current_price" class="form-label">Current Price</label>
                        <input type="number" step="0.01" class="form-control" id="current_price" name="current_price" value="{{ stock.CurrentPrice }}" min="0.01" required>
                    </div>

                    <div class="mb-3">
                        <label for="active_status" class="form-label">Status</label>
                        <select class="form-select" id="active_status" name="active_status">
                            <option value="1" {% if stock.ActiveStatus %}selected{% endif %}>Active</option>
                            <option value="0" {% if not stock.ActiveStatus %}selected{% endif %}>Inactive</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin_stocks') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Back
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Update Stock
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
