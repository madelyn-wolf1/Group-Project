{% extends "base.html" %}

{% block title %}Register - Stock Trader{% endblock %}

{% block content %}
<h1>Create New Account</h1>

<form method="POST" style="max-width: 400px; margin: 0 auto;">
    <div>
        <label for="first_name">First Name:</label>
        <input type="text" id="first_name" name="first_name" required placeholder="Enter your first name">
    </div>

    <div>
        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" name="last_name" required placeholder="Enter your last name">
    </div>

    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
    </div>

    <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="Choose a password">
    </div>

    <button type="submit" style="width: 100%; margin-top: 10px;">Register</button>
</form>

<div style="text-align: center; margin-top: 20px;">
    <p>Already have an account? <a href="/login" style="color: #2196F3;">Login here</a></p>
</div>
{% endblock %}
